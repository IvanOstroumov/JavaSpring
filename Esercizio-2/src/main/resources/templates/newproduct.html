<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Product</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Segoe UI", Arial, sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            color: #ffffff;
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 30px;
            text-align: center;
            letter-spacing: 1px;
        }

        form,
        table {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            border-radius: 16px;
            padding: 30px;
            width: 100%;
            max-width: 900px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        form div {
            margin-bottom: 18px;
            display: flex;
            flex-direction: column;
        }

        label {
            margin-bottom: 6px;
            font-size: 0.9rem;
            opacity: 0.9;
        }

        input {
            padding: 10px 14px;
            border-radius: 8px;
            border: none;
            outline: none;
            font-size: 0.95rem;
            background-color: rgba(255, 255, 255, 0.9);
            transition: 0.2s ease;
        }

        input:focus {
            transform: scale(1.02);
            box-shadow: 0 0 0 2px #00c6ff;
        }

        button {
            padding: 12px;
            border-radius: 10px;
            border: none;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            background: linear-gradient(90deg, #00c6ff, #0072ff);
            color: white;
            transition: 0.2s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 114, 255, 0.4);
        }

        table {
            border-collapse: collapse;
            overflow: hidden;
        }

        th {
            background: linear-gradient(90deg, #00c6ff, #0072ff);
            padding: 14px;
            text-align: left;
            font-weight: 600;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        tr:hover td {
            background-color: rgba(255, 255, 255, 0.1);
            transition: 0.2s;
        }

        body.error {
            justify-content: center;
            text-align: center;
        }

        body.error h1 {
            font-size: 3rem;
            color: #ff4e50;
        }
    </style>
</head>
<body>
<h1>Insert new product</h1>
<form method="POST" th:action="@{/newproduct}" th:object="${product}">
    <div>
        <label for="id">Id:</label>
        <input type="number" id="id" th:field="*{id}" placeholder="Inserisci l'id"/>
    </div>

    <div>
        <label for="name">Name:</label>
        <input type="text" id="name" th:field="*{name}" placeholder="Inserisci il nome"/>
    </div>

    <div>
        <label for="name">Price:</label>
        <input type="number" id="price" th:field="*{price}" placeholder="Inserisci il prezzo"/>
    </div>

    <div>
        <label for="expirationDate">Data:</label>
        <input type="date" id="expirationDate" th:field="*{expirationDate}" placeholder="Inserisci il nome"/>
    </div>

    <div>
        <label for="description">Description:</label>
        <input type="text" id="description" th:field="*{description}" placeholder="Inserisci la descrizione"/>
    </div>

    <div>
        <button type="submit">Salva product</button>

    </div>

</form>

</body>
</html>
