<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Product</title>
</head>
<body>
<h1>Welcome!</h1>
<form method="POST" th:action="@{/newproduct}" th:object="${product}">
    <div>
        <label for="id">Id:</label>
        <input type="number" id="id" th:field="*{id}" placeholder="Inserisci l'id" required/>
    </div>

    <div>
        <label for="name">Name:</label>
        <input type="text" id="name" th:field="*{name}" placeholder="Inserisci il nome" required/>
    </div>

    <div>
        <label for="name">Price:</label>
        <input type="number" id="price" th:field="*{price}" placeholder="Inserisci il prezzo" required/>
    </div>

    <div>
        <label for="expirationDate">Data:</label>
        <input type="date" id="expirationDate" th:field="*{expirationDate}" placeholder="Inserisci il nome" required/>
    </div>

    <div>
        <button type="submit">Salva product</button>

    </div>

</form>

</body>
</html>
