<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <title>New movie</title>
</head>
<link rel="stylesheet" th:href="@{/style.css}" type="text/css">
<body>

<nav class="main-nav">
    <a href="/movies">Movie list</a>
    <a href="/movies/insert">New movie</a>
    <a href="/movies/actor/insert">New actor</a>
    <a href="/movies/director/insert">New director</a>
</nav>

<h1>Insert new movie</h1>

<form method="POST" th:object="${movie}">
    <div>
        <label for="title">Title:</label>
        <input type="text" id="title" th:field="${movie.title}"/>
        <span class="validationError" th:if="${#fields.hasErrors('title')}"
              th:errors="${movie.title}">Title Error</span>

    </div>
    <div>
        <label for="genre">Genre:</label>
        <input type="text" id="genre" th:field="${movie.genre}"/>
        <span class="validationError" th:if="${#fields.hasErrors('genre')}"
              th:errors="${movie.genre}">Genre Error</span>
    </div>
    <div>
        <label for="director">Director:</label>
        <select th:field="${movie.director}" id="director">
            <option value="">Regista</option>
            <option th:each="director : ${directors}"
                    th:value="${director.id}"
                    th:text="${director.name + ' ' + director.surname}"></option>
        </select>
        <span class="validationError" th:if="${#fields.hasErrors('director')}"
              th:errors="${movie.director}">Director Error</span>
    </div>
    <div>
        <label>Actors:</label>
        <div th:each="actor : ${actors}" class="actor-checkbox-container">
            <input type="checkbox" th:field="${movie.actors}" th:value="${actor.id}" th:id="${'actor' + actor.id}">
            <label  th:for="${'actor' + actor.id}" th:text="${actor.name + ' ' + actor.surname}"></label>
        </div>
        <span class="validationError" th:if="${#fields.hasErrors('actors')}"
              th:errors="${movie.actors}">Actors Error</span>
    </div>
    <div>
        <button type="submit">Save</button>
    </div>
</form>

</body>
</html>
