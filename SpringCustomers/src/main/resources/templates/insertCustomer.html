<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <title>New customer</title>
    <style>body{
        font-family: Arial, Helvetica, sans-serif;
        background-color: #f4f6f8;
        margin: 40px;
    }

    /* TITOLI */
    h1{
        text-align: center;
        margin-bottom: 30px;
    }

    /* FORM */
    form{
        max-width: 400px;
        margin: auto;
        padding: 25px;
        background: white;
        border-radius: 8px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    form div{
        margin-bottom: 15px;
    }

    label{
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
    }

    input{
        width: 100%;
        padding: 8px;
        border-radius: 4px;
        border: 1px solid #ccc;
    }

    button{
        width: 100%;
        padding: 10px;
        background-color: #2c7be5;
        color: white;
        border: none;
        border-radius: 4px;
        font-size: 15px;
    }

    button:hover{
        background-color: #1a68d1;
        cursor: pointer;
    }

    /* ERRORI */
    .validationError{
        color: red;
        font-size: 13px;
    }

    /* TABLE */
    table{
        border-collapse: collapse;
        width: 100%;
        background: white;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    th, td{
        padding: 10px;
        border-bottom: 1px solid #ddd;
        text-align: left;
    }

    th{
        background-color: #2c7be5;
        color: white;
    }

    tr:hover{
        background-color: #f2f2f2;
    }</style>
</head>
<body>
<h1>Insert new customer</h1>

<form method="POST" th:object="${customer}">
    <div>
        <label for="name">Name:</label>
        <input type="text" id="name" th:field="${customer.name}"/>
        <span class="validationError" th:if="${#fields.hasErrors('name')}"
              th:errors="${customer.name}">Name Error</span>

    </div>
    <div>
        <label for="surname">Surname:</label>
        <input type="text" id="surname" th:field="${customer.surname}"/>
        <span class="validationError" th:if="${#fields.hasErrors('surname')}"
              th:errors="${customer.surname}">Name Error</span>
    </div>
    <div>
        <label for="age">Age:</label>
        <input type="number" id="age" th:field="${customer.age}"/>
        <span class="validationError" th:if="${#fields.hasErrors('age')}"
              th:errors="${customer.age}">Name Error</span>
    </div>

    <div>
        <label for="city">City:</label>
        <input type="text" id="city" th:field="${customer.city}"/>
        <span class="validationError" th:if="${#fields.hasErrors('city')}"
              th:errors="${customer.city}">City Error</span>
    </div>

    <div>
        <label for="ccnumber">ccnumber:</label>
        <input type="number" id="ccnumber" th:field="${customer.ccnumber}"/>
        <span class="validationError" th:if="${#fields.hasErrors('ccnumber')}"
              th:errors="${customer.ccnumber}">ccnumber Error</span>
    </div>

    <div>
        <label for="ccexpiration">ccexpiration:</label>
        <input type="text" id="ccexpiration" th:field="${customer.ccexpiration}"/>
        <span class="validationError" th:if="${#fields.hasErrors('ccexpiration')}"
              th:errors="${customer.ccexpiration}">ccexpiration Error</span>
    </div>

    <div>
        <label for="cccvv">cccvv:</label>
        <input type="number" id="cccvv" th:field="${customer.cccvv}"/>
        <span class="validationError" th:if="${#fields.hasErrors('cccvv')}"
              th:errors="${customer.cccvv}">cccvv Error</span>
    </div>
    <div>
        <button type="submit">Save</button>
    </div>
</form>

</body>
</html>
