<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Items</title>
    <style>body{
        font-family: Arial, Helvetica, sans-serif;
        background-color: #f4f6f8;
        margin: 40px;
    }

    /* TITOLI */
    h1{
        text-align: center;
        margin-bottom: 30px;
    }

    /* FORM */
    form{
        max-width: 400px;
        margin: auto;
        padding: 25px;
        background: white;
        border-radius: 8px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    form div{
        margin-bottom: 15px;
    }

    label{
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
    }

    input{
        width: 100%;
        padding: 8px;
        border-radius: 4px;
        border: 1px solid #ccc;
    }

    button{
        width: 100%;
        padding: 10px;
        background-color: #2c7be5;
        color: white;
        border: none;
        border-radius: 4px;
        font-size: 15px;
    }

    button:hover{
        background-color: #1a68d1;
        cursor: pointer;
    }

    /* ERRORI */
    .validationError{
        color: red;
        font-size: 13px;
    }

    /* TABLE */
    table{
        border-collapse: collapse;
        width: 100%;
        background: white;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    th, td{
        padding: 10px;
        border-bottom: 1px solid #ddd;
        text-align: left;
    }

    th{
        background-color: #2c7be5;
        color: white;
    }

    tr:hover{
        background-color: #f2f2f2;
    }</style>
</head>
<body>


<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Code</th>
        <th>Type</th>
        <th>Name</th>
        <th>Price</th>
        <th>Item Count</th>
    </tr>
    </thead>
    <tbody>

    <tr th:each="item : ${items}">
        <td th:text="${item.id}"></td>
        <td th:text="${item.code}"></td>
        <td th:text="${item.type}"></td>
        <td th:text="${item.name}"></td>
        <td th:text="${item.price}"></td>
        <td th:text="${item.itemcount}"></td>
    </tr>
    </tbody>
</table>

</body>
</html>
