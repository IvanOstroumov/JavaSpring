server:
  port: 8080
spring:
  jpa:
    hibernate:
      ddl-auto: update

    defer-datasource-initialization: true

  datasource:
    generate-unique-name: false
  sql:
    init:
      data-locations:
        - classpath:/db/gameProfileData.sql
        - classpath:/db/teamData.sql
        - classpath:/db/playerData.sql