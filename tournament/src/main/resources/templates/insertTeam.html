<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <title>New Team</title>
</head>
<link rel="stylesheet" th:href="@{/style.css}" type="text/css">
<body>

<nav class="main-nav">
    <a href="/tournament">Player list</a>
    <a href="/tournament/insert">New team</a>
    <a href="/tournament/teams">Team Player</a>
    <a href="/tournament/teams/insert">New Team</a>
</nav>

<h1>Insert new team</h1>

<form method="POST" th:object="${team}">
    <div>
        <label for="name">Name:</label>
        <input type="text" id="name" th:field="${team.name}"/>
        <span class="validationError" th:if="${#fields.hasErrors('name')}"
              th:errors="${team.name}">Name Error</span>
    </div>
    <div>
        <button type="submit">Save</button>
    </div>
</form>

</body>
</html>
