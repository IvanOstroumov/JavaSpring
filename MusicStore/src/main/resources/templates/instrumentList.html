<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Instruments</title>
    <style>body{
        font-family: Arial, Helvetica, sans-serif;
        background-color: #f4f6f8;
    }

    /* TITOLI */
    h1{
        text-align: center;
        margin-bottom: 30px;
    }

    /* FORM */
    form{
        max-width: 400px;
        margin: auto;
        padding: 25px;
        background: white;
        border-radius: 8px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    form div{
        margin-bottom: 15px;
    }

    label{
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
    }

    input{
        width: 100%;
        padding: 8px;
        border-radius: 4px;
        border: 1px solid #ccc;
    }

    button{
        width: 100%;
        padding: 10px;
        background-color: #2c7be5;
        color: white;
        border: none;
        border-radius: 4px;
        font-size: 15px;
    }

    button:hover{
        background-color: #1a68d1;
        cursor: pointer;
    }

    /* ERRORI */
    .validationError{
        color: red;
        font-size: 13px;
    }

    /* TABLE */
    table{
        border-collapse: collapse;
        width: 100%;
        background: white;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    th, td{
        padding: 10px;
        border-bottom: 1px solid #ddd;
        text-align: left;
    }

    th{
        background-color: #2c7be5;
        color: white;
    }

    tr:hover{
        background-color: #f2f2f2;
    }


    .topnav {
        overflow: hidden;
        background-color: #2c7be5;
    }

    .topnav a {
        float: left;
        color: #f2f2f2;
        text-align: center;
        padding: 14px 16px;
        text-decoration: none;
        font-size: 17px;
    }

    .topnav a:hover {
        background-color: #ddd;
        color: #c7be5;
    }

    .topnav a.active {
        background-color: #2c7be5;
        color: white;
    }</style>
</head>
<body>
<div class="topnav">
    <a th:href="@{/instruments}">Instruments</a>
    <a th:href="@{/instruments/insert}">Insert</a>
    <a th:href="@{/instruments/5000}">Less than 5000</a>
</div>

<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Type</th>
        <th>Brand</th>
        <th>Model</th>
        <th>Price</th>
        <th>Stock</th>
        <th>Sell</th>
    </tr>
    </thead>
    <tbody>

    <tr th:each="instrument : ${instruments}">
        <td th:text="${instrument.id}"></td>
        <td th:text="${instrument.type}"></td>
        <td th:text="${instrument.brand}"></td>
        <td th:text="${instrument.model}"></td>
        <td th:text="${instrument.price}"></td>
        <td th:text="${instrument.stock}"></td>
        <td><a th:href="@{/instruments/sell/{id}(id=${instrument.id})}"><button>Sell One</button></a></td>

    </tr>
    </tbody>
</table>

</body>
</html>
