<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">
<head>
  <title>New instrument</title>
  <style>body {
    font-family: Arial, Helvetica, sans-serif;
    background-color: #f4f6f8;
  }

  /* TITOLI */
  h1 {
    text-align: center;
    margin-bottom: 30px;
  }

  /* FORM */
  form {
    max-width: 400px;
    margin: auto;
    padding: 25px;
    background: white;
    border-radius: 8px;
    box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
  }

  form div {
    margin-bottom: 15px;
  }

  label {
    display: block;
    margin-bottom: 5px;
    font-weight: bold;
  }

  input {
    width: 100%;
    padding: 8px;
    border-radius: 4px;
    border: 1px solid #ccc;
  }

  button {
    width: 100%;
    padding: 10px;
    background-color: #2c7be5;
    color: white;
    border: none;
    border-radius: 4px;
    font-size: 15px;
  }

  button:hover {
    background-color: #1a68d1;
    cursor: pointer;
  }

  /* ERRORI */
  .validationError {
    color: red;
    font-size: 13px;
  }

  /* TABLE */
  table {
    border-collapse: collapse;
    width: 100%;
    background: white;
    box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
  }

  th, td {
    padding: 10px;
    border-bottom: 1px solid #ddd;
    text-align: left;
  }

  th {
    background-color: #2c7be5;
    color: white;
  }

  tr:hover {
    background-color: #f2f2f2;
  }

  .topnav {
    overflow: hidden;
    background-color: #2c7be5;
  }

  .topnav a {
    float: left;
    color: #f2f2f2;
    text-align: center;
    padding: 14px 16px;
    text-decoration: none;
    font-size: 17px;
  }

  .topnav a:hover {
    background-color: #ddd;
    color: #c7be5;
  }

  .topnav a.active {
    background-color: #2c7be5;
    color: white;
  }</style>
</head>
<body>
<div class="topnav">
  <a th:href="@{/instruments}">Instruments</a>
  <a th:href="@{/instruments/insert}">Insert</a>
  <a th:href="@{/instruments/5000}">Less than 5000</a>
</div>
<h1>Insert new instrument</h1>

<form method="POST" th:object="${instrument}">
  <div>
    <label for="type">Type:</label>
    <input type="text" id="type" th:field="${instrument.type}"/>
    <span class="validationError" th:if="${#fields.hasErrors('type')}"
          th:errors="${instrument.type}">Type Error</span>
  </div>
  <div>
    <label for="brand">Brand:</label>
    <input type="text" id="brand" th:field="${instrument.brand}"/>
    <span class="validationError" th:if="${#fields.hasErrors('brand')}"
          th:errors="${instrument.brand}">Brand Error</span>
  </div>
  <div>
    <label for="model">Model:</label>
    <input type="text" id="model" th:field="${instrument.model}"/>
    <span class="validationError" th:if="${#fields.hasErrors('model')}"
          th:errors="${instrument.model}">Model Error</span>
  </div>

  <div>
    <label for="price">Price:</label>
    <input type="text" id="price" th:field="${instrument.price}"/>
    <span class="validationError" th:if="${#fields.hasErrors('price')}"
          th:errors="${instrument.price}">Price Error</span>
  </div>

  <div>
    <label for="stock">Stock:</label>
    <input type="text" id="stock" th:field="${instrument.stock}"/>
    <span class="validationError" th:if="${#fields.hasErrors('stock')}"
          th:errors="${instrument.stock}">Stock Error</span>
  </div>
  <div>
    <button type="submit">Save</button>
  </div>
</form>

</body>
</html>
