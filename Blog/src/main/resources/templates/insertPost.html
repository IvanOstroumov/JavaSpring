<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <title>New Blog Post</title>
    <style>

        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f4f6f8;
            margin: 40px;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
        }

        form {
            max-width: 500px;
            margin: auto;
            padding: 25px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 12px rgba(0, 0, 0, 0.1);
        }

        form div {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input, textarea {
            width: 100%;
            padding: 8px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        textarea {
            resize: vertical;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #2c7be5;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 15px;
        }

        button:hover {
            background-color: #1a68d1;
            cursor: pointer;
        }

        .validationError {
            color: red;
            font-size: 13px;
        }

    </style>
</head>
<body>

<h1>Create New Blog Post</h1>

<form method="POST" th:object="${post}">

    <!-- TITLE -->
    <div>
        <label for="title">Title:</label>
        <input type="text" id="title" th:field="*{title}"/>
        <span class="validationError"
              th:if="${#fields.hasErrors('title')}"
              th:errors="*{title}">Title Error</span>
    </div>

    <!-- DATE -->
    <div>
        <label for="pubdate">Publication Date:</label>
        <input type="date" id="pubdate" th:field="*{pubdate}"/>
        <span class="validationError"
              th:if="${#fields.hasErrors('pubdate')}"
              th:errors="*{pubdate}">Date Error</span>
    </div>

    <!-- CATEGORY -->
    <div>
        <label for="category">Category:</label>
        <input type="text" id="category" th:field="*{category}"/>
        <span class="validationError"
              th:if="${#fields.hasErrors('category')}"
              th:errors="*{category}">Category Error</span>
    </div>

    <!-- AUTHOR -->
    <div>
        <label for="author">Author:</label>
        <input type="text" id="author" th:field="*{author}"/>
        <span class="validationError"
              th:if="${#fields.hasErrors('author')}"
              th:errors="*{author}">Author Error</span>
    </div>

    <!-- LIKES -->
    <div>
        <label for="likes">Likes:</label>
        <input type="number" id="likes" th:field="*{likes}" min="0"/>
        <span class="validationError"
              th:if="${#fields.hasErrors('likes')}"
              th:errors="*{likes}">Likes Error</span>
    </div>

    <!-- CONTENT (IMPORTANT: textarea + @Lob) -->
    <div>
        <label for="content">Content:</label>
        <textarea id="content" rows="6" th:field="*{content}"></textarea>
        <span class="validationError"
              th:if="${#fields.hasErrors('content')}"
              th:errors="*{content}">Content Error</span>
    </div>

    <div>
        <button type="submit">Publish Post</button>
    </div>

</form>

</body>
</html>
